name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permet aussi de lancer manuellement depuis GitHub

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Configure Java 17 (requis par React Native + Gradle)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Configure le SDK Android
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Crée le fichier env.ts avec les clés Supabase
      #    (stockées en secrets GitHub, jamais exposées dans le code)
      - name: Create env.ts from secrets
        run: |
          mkdir -p src/config
          cat > src/config/env.ts << EOF
          export const SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          export const SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          EOF

      # 6. Installe les dépendances npm
      #    (patch-package s'exécute automatiquement via postinstall)
      - name: Install dependencies
        run: npm install

      # 7. Donne les permissions d'exécution à Gradle
      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      # 8. Compile l'APK de debug
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # 9. Publie l'APK comme artefact téléchargeable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Spotify-Clone-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
